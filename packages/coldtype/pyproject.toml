[project]
name = "coldtype"
version = "0.13.1"
dependencies = [
    "coldtype-core==0.13.1",
    "glfw",
    "PyOpenGL",
    "skia-python",
    "skia-pathops",
    "numpy",
    "potracer",
    "requests>=2.32.4",
    "mido",
    "ufo2ft>=3.2.8", # pin for fg issue
    "coldtype-fontgoggles[more-fonts]==1.8.4.7",
    "tqdm",
]

[project.urls]
Homepage = "https://coldtype.xyz"
Documentation = "https://coldtype.goodhertz.com"
Repository = "https://github.com/coldtype/coldtype"
Issues = "https://github.com/coldtype/coldtype/issues"
Changelog = "https://github.com/coldtype/coldtype/blob/main/CHANGELOG.md"

[project.scripts]
coldtype = "coldtype.cli:main"

[project.optional-dependencies]
more-fonts = [
    "ufo2ft>=3.2.8", # pin for fg issue
    "coldtype-fontgoggles[more-fonts]==1.8.4.7"
]
viewer = []
drawbot = ["numpy"]
unicode = ["unicodedata2"]
audio = ["pyaudio", "soundfile"]
website = [
    "jinja2>=3.1.6",
    "python-frontmatter",
    "livereload",
    "Markdown>=3.8.1",
    "markdown-captions",
    "beautifulsoup4",
    "brotli>=1.2.0",
    "lxml",
    "pygments",
    "sourcetypes",
    "favicons",
    "tornado>=6.5.5"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coldtype"]

[tool.uv.sources]
coldtype-core = { workspace = true }